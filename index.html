<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ML-Nexus Resource Hub</title>
    <meta name="description" content="A premium interactive index and resource hub for machine learning systems, project scaffolds, and infrastructure engineering modules.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Marked for Markdown Parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- Prism.js for Code Syntax Highlighting -->
    <link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-core.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
    
    <!-- KaTeX for LaTeX Math Equation Rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

    <style>
        /* Custom Premium CSS System */
        :root {
            --bg-primary: #080c14;
            --bg-secondary: rgba(13, 20, 35, 0.65);
            --bg-sidebar: #0b111e;
            --accent: hsl(250, 85%, 65%);
            --accent-hover: hsl(250, 85%, 72%);
            --accent-gradient: linear-gradient(135deg, hsl(250, 85%, 65%), hsl(280, 85%, 55%));
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: rgba(255, 255, 255, 0.08);
            --hover-bg: rgba(255, 255, 255, 0.04);
            --active-bg: rgba(255, 255, 255, 0.08);
            --shadow-lg: 0 10px 25px -5px rgba(0, 0, 0, 0.4), 0 8px 10px -6px rgba(0, 0, 0, 0.4);
            
            /* Alerts color palette */
            --color-note: #3b82f6;
            --color-tip: #10b981;
            --color-important: #8b5cf6;
            --color-warning: #f59e0b;
            --color-caution: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.15) transparent;
        }

        /* Scrollbar styles */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* App Container */
        .app-container {
            display: flex;
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: 320px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            height: 100%;
            flex-shrink: 0;
            z-index: 10;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Sidebar Header */
        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            margin-bottom: 16px;
        }

        .brand-logo {
            width: 32px;
            height: 32px;
            background: var(--accent-gradient);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-family: 'Outfit', sans-serif;
            color: #fff;
            box-shadow: 0 4px 10px rgba(99, 102, 241, 0.3);
        }

        .brand-name {
            font-family: 'Outfit', sans-serif;
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            background: linear-gradient(135deg, #ffffff 60%, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Search Bar */
        .search-container {
            position: relative;
            width: 100%;
        }

        .search-input {
            width: 100%;
            padding: 10px 16px 10px 38px;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 0.875rem;
            transition: all 0.2s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            background-color: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            fill: var(--text-muted);
            width: 14px;
            height: 14px;
            pointer-events: none;
        }

        /* Sidebar Navigation Area */
        .sidebar-menu {
            flex-grow: 1;
            overflow-y: auto;
            padding: 16px 8px;
        }

        /* Tree Menu Styles */
        .tree-node {
            margin-bottom: 2px;
        }

        .tree-folder {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-muted);
            transition: all 0.15s ease;
            gap: 8px;
        }

        .tree-folder:hover {
            background-color: var(--hover-bg);
            color: var(--text-main);
        }

        .tree-folder-icon {
            width: 16px;
            height: 16px;
            fill: var(--text-muted);
            transition: transform 0.2s ease;
            flex-shrink: 0;
        }

        .tree-node.expanded > .tree-folder > .tree-folder-icon {
            transform: rotate(90deg);
        }

        .tree-children {
            display: none;
            padding-left: 14px;
            margin-top: 2px;
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            margin-left: 19px;
        }

        .tree-node.expanded > .tree-children {
            display: block;
        }

        .tree-file {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            color: var(--text-muted);
            transition: all 0.15s ease;
            gap: 8px;
            text-decoration: none;
        }

        .tree-file:hover {
            background-color: var(--hover-bg);
            color: var(--text-main);
        }

        .tree-file.active {
            background: rgba(99, 102, 241, 0.12);
            color: #fff;
            font-weight: 500;
            border-left: 3px solid var(--accent);
            padding-left: 9px;
            border-radius: 0 6px 6px 0;
        }

        .tree-file-icon {
            width: 14px;
            height: 14px;
            fill: var(--text-muted);
            flex-shrink: 0;
        }

        .tree-file.active > .tree-file-icon {
            fill: #a5b4fc;
        }

        /* Main Workspace Container */
        .workspace {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
            position: relative;
            background: radial-gradient(circle at 50% 0%, #0e1628, #080c14 80%);
        }

        /* Top Bar */
        .top-bar {
            height: 64px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            background-color: rgba(8, 12, 20, 0.4);
            backdrop-filter: blur(12px);
            z-index: 5;
        }

        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 16px;
            min-width: 0;
        }

        /* Mobile Menu Toggle */
        .menu-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--text-main);
            cursor: pointer;
            padding: 8px;
        }

        .breadcrumbs {
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .breadcrumbs span {
            transition: color 0.15s ease;
        }

        .breadcrumbs span[style*="cursor:pointer"]:hover {
            color: #fff;
            text-decoration: underline;
        }

        .breadcrumb-separator {
            color: rgba(255, 255, 255, 0.2);
            flex-shrink: 0;
        }

        .breadcrumb-active {
            color: var(--text-main);
            font-weight: 500;
            text-overflow: ellipsis;
            overflow: hidden;
            white-space: nowrap;
        }

        .top-bar-right {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-shrink: 0;
        }

        .github-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-main);
            font-size: 0.85rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .github-btn:hover {
            background-color: var(--hover-bg);
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* Progress Bar */
        .reading-progress-container {
            width: 100%;
            height: 2px;
            background-color: transparent;
            position: absolute;
            top: 64px;
            left: 0;
            z-index: 6;
        }

        .reading-progress-bar {
            height: 100%;
            width: 0%;
            background: var(--accent-gradient);
            transition: width 0.1s ease;
        }

        /* Main Content View Panel */
        .content-panel {
            flex-grow: 1;
            overflow-y: auto;
            padding: 40px;
            display: flex;
            justify-content: center;
            scroll-behavior: smooth;
        }

        /* Document Reader Panel */
        .reader-container {
            max-width: 960px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 240px;
            gap: 48px;
            animation: fadeIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .reader-main {
            min-width: 0;
        }

        /* Welcome/Readme Hero decoration block */
        .readme-hero {
            padding: 40px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.08), rgba(139, 92, 246, 0.03)),
                        var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            text-align: center;
            backdrop-filter: blur(16px);
            box-shadow: var(--shadow-lg);
            margin-bottom: 40px;
        }

        .readme-hero-title {
            font-family: 'Outfit', sans-serif;
            font-size: 2.75rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #ffffff, #c7d2fe, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .readme-hero-subtitle {
            font-size: 1.05rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.5;
        }

        /* Stats counters */
        .hero-stats {
            display: flex;
            justify-content: center;
            gap: 48px;
        }

        .stat-card {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-val {
            font-family: 'Outfit', sans-serif;
            font-size: 1.75rem;
            font-weight: 700;
            color: #fff;
        }

        .stat-lbl {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 2px;
        }

        /* Side Table of Contents (TOC) */
        .toc-aside {
            position: sticky;
            top: 0;
            height: fit-content;
            padding: 8px 0;
            border-left: 1px solid var(--border-color);
            padding-left: 20px;
        }

        .toc-title {
            font-family: 'Outfit', sans-serif;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 16px;
            font-weight: 700;
        }

        .toc-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toc-link {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.15s ease;
            display: block;
            line-height: 1.4;
            cursor: pointer;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .toc-link:hover {
            color: var(--text-main);
        }

        .toc-link.active {
            color: #818cf8;
            font-weight: 500;
        }

        .toc-link.indent-2 {
            padding-left: 12px;
        }

        /* Premium Markdown Rendering Styles */
        .markdown-body {
            line-height: 1.625;
            font-size: 0.975rem;
            color: #d1d5db;
        }

        .markdown-body h1, 
        .markdown-body h2, 
        .markdown-body h3, 
        .markdown-body h4 {
            font-family: 'Outfit', sans-serif;
            color: #fff;
            margin-top: 1.8em;
            margin-bottom: 0.6em;
            font-weight: 700;
            scroll-margin-top: 80px;
        }

        .markdown-body h1 {
            font-size: 2.1rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
            margin-top: 0;
            letter-spacing: -0.02em;
        }

        .markdown-body h2 {
            font-size: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 6px;
            letter-spacing: -0.01em;
        }

        .markdown-body h3 {
            font-size: 1.2rem;
        }

        .markdown-body p {
            margin-bottom: 1.25em;
        }

        .markdown-body a {
            color: #818cf8;
            text-decoration: none;
            border-bottom: 1px dotted rgba(129, 140, 248, 0.4);
            transition: all 0.15s ease;
        }

        .markdown-body a:hover {
            color: var(--accent-hover);
            border-bottom-color: var(--accent-hover);
        }

        .markdown-body ul, 
        .markdown-body ol {
            margin-bottom: 1.25em;
            padding-left: 20px;
        }

        .markdown-body li {
            margin-bottom: 0.5em;
        }

        /* Code and Pre Blocks */
        .markdown-body code {
            font-family: 'Fira Code', monospace;
            background-color: rgba(255, 255, 255, 0.08);
            padding: 0.2em 0.4em;
            border-radius: 4px;
            font-size: 0.85em;
            color: #f3f4f6;
        }

        .markdown-body pre {
            background-color: #090e1a !important;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 1.5em;
            overflow-x: auto;
        }

        .markdown-body pre code {
            background-color: transparent;
            padding: 0;
            font-size: 0.85rem;
            color: #f3f4f6;
        }

        /* Code Block Copy Button Container */
        .code-wrapper {
            position: relative;
            margin-bottom: 1.5em;
        }

        .code-wrapper pre {
            margin-bottom: 0;
        }

        .copy-code-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 4px 8px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 4px;
            color: #9ca3af;
            font-size: 0.725rem;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s, background 0.2s, color 0.2s;
            font-family: inherit;
        }

        .code-wrapper:hover .copy-code-btn {
            opacity: 1;
        }

        .copy-code-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
        }

        /* Horizontal rule */
        .markdown-body hr {
            border: 0;
            height: 1px;
            background-color: var(--border-color);
            margin: 2.5em 0;
        }

        /* Blockquotes and Custom GitHub Alerts */
        .markdown-body blockquote {
            border-left: 4px solid var(--border-color);
            padding: 0 0 0 16px;
            color: var(--text-muted);
            margin-bottom: 1.5em;
        }

        .alert-box {
            border-left: 4px solid var(--border-color);
            padding: 14px 16px;
            border-radius: 0 8px 8px 0;
            background-color: rgba(255, 255, 255, 0.015);
            margin-bottom: 1.5em;
            backdrop-filter: blur(4px);
        }

        .alert-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .alert-title svg {
            flex-shrink: 0;
        }

        .alert-box.note { border-left-color: var(--color-note); background-color: rgba(59, 130, 246, 0.02); }
        .alert-box.note .alert-title { color: var(--color-note); }

        .alert-box.tip { border-left-color: var(--color-tip); background-color: rgba(16, 185, 129, 0.02); }
        .alert-box.tip .alert-title { color: var(--color-tip); }

        .alert-box.important { border-left-color: var(--color-important); background-color: rgba(139, 92, 246, 0.02); }
        .alert-box.important .alert-title { color: var(--color-important); }

        .alert-box.warning { border-left-color: var(--color-warning); background-color: rgba(245, 158, 173, 0.02); }
        .alert-box.warning .alert-title { color: var(--color-warning); }

        .alert-box.caution { border-left-color: var(--color-caution); background-color: rgba(239, 68, 68, 0.02); }
        .alert-box.caution .alert-title { color: var(--color-caution); }

        /* Tables */
        .markdown-body table {
            border-collapse: collapse;
            width: 100%;
            margin-bottom: 1.5em;
            font-size: 0.9rem;
        }

        .markdown-body th, 
        .markdown-body td {
            border: 1px solid var(--border-color);
            padding: 10px 14px;
            text-align: left;
        }

        .markdown-body th {
            background-color: rgba(255, 255, 255, 0.03);
            font-weight: 600;
            color: #fff;
        }

        .markdown-body tr:nth-child(even) {
            background-color: rgba(255, 255, 255, 0.01);
        }

        /* Search Results Panel */
        .search-results-panel {
            display: none;
            max-width: 860px;
            width: 100%;
            animation: fadeIn 0.2s ease;
        }

        .search-results-header {
            margin-bottom: 24px;
        }

        .search-results-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
        }

        .search-results-count {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .search-results-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .search-result-item {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(8px);
        }

        .search-result-item:hover {
            border-color: rgba(99, 102, 241, 0.4);
            transform: translateX(4px);
            background-color: rgba(13, 20, 35, 0.85);
        }

        .search-result-name {
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 6px;
        }

        .search-result-path {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Error Screen */
        .error-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
            height: 100%;
        }

        .error-title {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            color: #fff;
            margin-bottom: 12px;
        }

        .error-desc {
            color: var(--text-muted);
            max-width: 400px;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .error-btn {
            padding: 10px 20px;
            background: var(--accent-gradient);
            border: none;
            border-radius: 6px;
            color: #fff;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        .error-btn:hover {
            opacity: 0.9;
        }

        /* Floating Scroll to Top button */
        .scroll-top-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: rgba(99, 102, 241, 0.2);
            border: 1px solid rgba(99, 102, 241, 0.3);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s, background-color 0.2s;
            z-index: 10;
        }

        .scroll-top-btn.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .scroll-top-btn:hover {
            background-color: rgba(99, 102, 241, 0.4);
        }

        /* Fade-in Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive Layout Overrides */
        @media (max-width: 1024px) {
            .reader-container {
                grid-template-columns: 1fr; /* Stack TOC */
            }
            .toc-aside {
                display: none; /* Hide floating TOC on medium screens */
            }
        }

        @media (max-width: 768px) {
            .menu-toggle {

            }
        }
    </style>
</head>

    <!-- Scroll to Top floating button -->
    <button id="scroll-top-btn" class="scroll-top-btn" aria-label="Scroll to Top">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="18 15 12 9 6 15"></polyline>
        </svg>
    </button>

    <!-- UI Logic and Rendering Script -->
    <script>
        let filesTree = [];
        let flattenedFiles = [];
        let currentFilePath = '';
        let stats = { lessons: '0', designs: '0', projects: '0' };

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            setupEventListeners();
            loadStructure();
        });

        // Set up Event Listeners
        function setupEventListeners() {
            // Mobile Menu Toggle
            const menuToggle = document.getElementById('menu-toggle-btn');
            const sidebar = document.getElementById('sidebar');
            menuToggle.addEventListener('click', (e) => {
                sidebar.classList.toggle('mobile-open');
                e.stopPropagation();
            });

            // Close mobile menu on clicking content
            document.getElementById('content-panel').addEventListener('click', () => {
                sidebar.classList.remove('mobile-open');
            });

            // Handle browser navigation (back/forward)
            window.addEventListener('hashchange', handleRouting);

            // Handle Live Search
            const searchInput = document.getElementById('search-input');
            searchInput.addEventListener('input', (e) => {
                handleSearch(e.target.value);
            });

            // Handle progress bar and scroll-to-top button
            const contentPanel = document.getElementById('content-panel');
            const scrollTopBtn = document.getElementById('scroll-top-btn');
            contentPanel.addEventListener('scroll', () => {
                // Progress Bar
                const totalHeight = contentPanel.scrollHeight - contentPanel.clientHeight;
                if (totalHeight > 0) {
                    const progress = (contentPanel.scrollTop / totalHeight) * 100;
                    document.getElementById('progress-bar').style.width = `${progress}%`;
                } else {
                    document.getElementById('progress-bar').style.width = '0%';
                }

                // Scroll to top visibility
                if (contentPanel.scrollTop > 300) {
                    scrollTopBtn.classList.add('visible');
                } else {
                    scrollTopBtn.classList.remove('visible');
                }
            });

            scrollTopBtn.addEventListener('click', () => {
                contentPanel.scrollTo({ top: 0, behavior: 'smooth' });
            });

            // Intercept relative markdown link clicks to navigate within the SPA
            document.getElementById('markdown-content').addEventListener('click', (e) => {
                const link = e.target.closest('a');
                if (!link) return;

                const href = link.getAttribute('href');
                if (!href) return;

                // Skip external, mailto, or local page anchor links
                if (href.startsWith('http://') || href.startsWith('https://') || href.startsWith('mailto:') || href.startsWith('#')) {
                    return;
                }

                // Prevent default normal page navigation
                e.preventDefault();

                // Resolve relative path against current file
                const resolved = resolveRelativePath(currentFilePath, href);
                navigateToResolvedPath(resolved);
            });
        }

        // Resolve relative file paths
        function resolveRelativePath(basePath, relativePath) {
            // Decode url components
            relativePath = decodeURIComponent(relativePath);
            
            // Extract base folder
            const parts = basePath.split('/');
            parts.pop(); // Remove filename to get base directory
            
            const relParts = relativePath.split('/');
            for (const part of relParts) {
                if (part === '.' || part === '') {
                    continue;
                } else if (part === '..') {
                    parts.pop();
                } else {
                    parts.push(part);
                }
            }
            return parts.join('/');
        }

        // Navigate to a resolved path inside the SPA
        function navigateToResolvedPath(resolvedPath) {
            // 1. Exact file match check
            const exactFile = flattenedFiles.find(f => f.path === resolvedPath);
            if (exactFile) {
                window.location.hash = encodeURIComponent(resolvedPath);
                return;
            }

            // 2. Folder readme search
            const readmeAlternatives = [
                resolvedPath + '/readme.md',
                resolvedPath + '/README.md',
                resolvedPath + '/Readme.md',
                resolvedPath + '/index.html' // in case of index.html links
            ];

            for (const rPath of readmeAlternatives) {
                const readmeFile = flattenedFiles.find(f => f.path === rPath);
                if (readmeFile) {
                    window.location.hash = encodeURIComponent(rPath);
                    return;
                }
            }

            // 3. Fallback: navigate to first file matching directory path prefix
            const dirPrefix = resolvedPath.endsWith('/') ? resolvedPath : resolvedPath + '/';
            const childFile = flattenedFiles.find(f => f.path.startsWith(dirPrefix));
            if (childFile) {
                window.location.hash = encodeURIComponent(childFile.path);
                return;
            }

            console.warn(`Could not resolve dynamic route for path: ${resolvedPath}`);
            // Force hash change as fallback so error state displays
            window.location.hash = encodeURIComponent(resolvedPath);
        }

        // Fetch structure.json and initialize tree
        async function loadStructure() {
            try {
                const response = await fetch('structure.json');
                if (!response.ok) throw new Error('Failed to fetch structure index');
                filesTree = await response.json();
                
                // Flatten tree nodes
                flattenTree(filesTree);
                
                // Calculate repo stats
                calculateStats();
                
                // Build sidebar
                renderSidebar(filesTree, document.getElementById('sidebar-menu'));
                
                // Handle routing
                handleRouting();
            } catch (err) {
                console.error('Error initializing structure:', err);
                document.getElementById('sidebar-menu').innerHTML = `
                    <div style="padding: 16px; color: var(--color-caution); font-size: 0.85rem;">
                        Failed to build resource navigation. Ensure you run the build-index script.
                    </div>
                `;
            }
        }

        // Flatten tree node helper
        function flattenTree(nodes) {
            for (const node of nodes) {
                if (node.type === 'file') {
                    flattenedFiles.push(node);
                } else if (node.type === 'directory' && node.children) {
                    flattenTree(node.children);
                }
            }
        }

        // Calculate statistics for home screen
        function calculateStats() {
            let lessonsCount = 0;
            let designsCount = 0;
            let projectsCount = 0;

            flattenedFiles.forEach(f => {
                const lowerPath = f.path.toLowerCase();
                if (lowerPath.includes('lesson') || lowerPath.includes('lecture')) lessonsCount++;
                else if (lowerPath.includes('system design') || lowerPath.includes('mlsd')) designsCount++;
                else if (lowerPath.includes('project')) projectsCount++;
            });

            stats.lessons = lessonsCount || '15+';
            stats.designs = designsCount || '50+';
            stats.projects = projectsCount || '5+';
        }

        // Render Sidebar HTML Tree
        function renderSidebar(nodes, container) {
            container.innerHTML = '';
            const ul = document.createElement('div');
            
            nodes.forEach(node => {
                const item = document.createElement('div');
                item.className = 'tree-node';
                
                if (node.type === 'directory') {
                    const folderDiv = document.createElement('div');
                    folderDiv.className = 'tree-folder';
                    
                    // Folder SVG Icon
                    folderDiv.innerHTML = `
                        <svg class="tree-folder-icon" viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
                        <span>${node.name}</span>
                    `;
                    
                    const childrenDiv = document.createElement('div');
                    childrenDiv.className = 'tree-children';
                    
                    folderDiv.addEventListener('click', (e) => {
                        item.classList.toggle('expanded');
                        e.stopPropagation();
                    });
                    
                    item.appendChild(folderDiv);
                    item.appendChild(childrenDiv);
                    
                    renderSidebar(node.children, childrenDiv);
                } else {
                    const fileLink = document.createElement('a');
                    fileLink.className = 'tree-file';
                    fileLink.href = `#${encodeURIComponent(node.path)}`;
                    fileLink.dataset.filepath = node.path;
                    
                    // File SVG Icon
                    fileLink.innerHTML = `
                        <svg class="tree-file-icon" viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
                        <span>${node.name}</span>
                    `;
                    
                    fileLink.addEventListener('click', () => {
                        document.querySelectorAll('.tree-file').forEach(el => el.classList.remove('active'));
                        fileLink.classList.add('active');
                        document.getElementById('sidebar').classList.remove('mobile-open');
                    });
                    
                    item.appendChild(fileLink);
                }
                ul.appendChild(item);
            });
            container.appendChild(ul);
        }

        // Routing Handler (reads hash and displays correct panel)
        function handleRouting() {
            const hash = window.location.hash.substring(1);
            const searchInput = document.getElementById('search-input');
            
            // Clear search when navigating to files
            if (hash && searchInput.value) {
                searchInput.value = '';
            }

            if (!hash) {
                goHome();
                return;
            }

            const decodedPath = decodeURIComponent(hash);
            loadFile(decodedPath);
        }

        // Go back to home dashboard (shows root README.md)
        function goHome() {
            window.location.hash = '';
            currentFilePath = 'README.md';
            
            document.getElementById('search-view').style.display = 'none';
            document.getElementById('error-view').style.display = 'none';
            
            // Clear active highlights in sidebar
            document.querySelectorAll('.tree-file').forEach(el => el.classList.remove('active'));
            
            // Reset Breadcrumbs
            document.getElementById('breadcrumbs').innerHTML = '<span class="breadcrumb-active">Home</span>';
            document.getElementById('progress-bar').style.width = '0%';

            loadFile('README.md');
        }

        // Parse custom SVG-styled GitHub Alerts
        function parseAlertBlocks(markdown) {
            const alertRegex = /^>\s*\[\!(NOTE|TIP|IMPORTANT|WARNING|CAUTION)\]\s*\n((?:^>.*\n?)*)/gim;
            return markdown.replace(alertRegex, (match, type, content) => {
                const cleanContent = content.replace(/^>\s?/gm, '').trim();
                const cleanType = type.toLowerCase();
                
                let iconSvg = '';
                if (cleanType === 'note') {
                    iconSvg = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>`;
                } else if (cleanType === 'tip') {
                    iconSvg = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .6 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"></path><line x1="9" y1="18" x2="15" y2="18"></line><line x1="10" y1="22" x2="14" y2="22"></line></svg>`;
                } else if (cleanType === 'important') {
                    iconSvg = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>`;
                } else if (cleanType === 'warning') {
                    iconSvg = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>`;
                } else if (cleanType === 'caution') {
                    iconSvg = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="7.86 2 16.14 2 22 7.86 22 16.14 16.14 22 7.86 22 2 16.14 2 7.86 7.86 2"></polygon><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>`;
                }
                
                return `
<div class="alert-box ${cleanType}">
    <div class="alert-title">${iconSvg}<span>${type}</span></div>
    <div class="alert-body">${marked.parse(cleanContent)}</div>
</div>`;
            });
        }

        // Add copy buttons to rendered code blocks
        function addCopyButtons() {
            const preBlocks = document.querySelectorAll('.markdown-body pre');
            preBlocks.forEach(pre => {
                if (pre.parentNode.classList.contains('code-wrapper')) return;

                const wrapper = document.createElement('div');
                wrapper.className = 'code-wrapper';
                
                pre.parentNode.insertBefore(wrapper, pre);
                wrapper.appendChild(pre);

                const button = document.createElement('button');
                button.className = 'copy-code-btn';
                button.innerText = 'Copy';
                button.addEventListener('click', () => {
                    const code = pre.querySelector('code');
                    navigator.clipboard.writeText(code.innerText).then(() => {
                        button.innerText = 'Copied!';
                        setTimeout(() => { button.innerText = 'Copy'; }, 2000);
                    });
                });
                wrapper.appendChild(button);
            });
        }

        // Load and Render Markdown File
        async function loadFile(filePath) {
            currentFilePath = filePath;
            
            document.getElementById('reader-view').style.display = 'none';
            document.getElementById('search-view').style.display = 'none';
            document.getElementById('error-view').style.display = 'none';
            
            // Highlight active sidebar file link
            document.querySelectorAll('.tree-file').forEach(el => {
                if (el.dataset.filepath === filePath) {
                    el.classList.add('active');
                    
                    // Auto-expand parent folders
                    let parent = el.closest('.tree-children');
                    while (parent) {
                        const parentNode = parent.closest('.tree-node');
                        if (parentNode) parentNode.classList.add('expanded');
                        parent = parentNode ? parentNode.parentElement.closest('.tree-children') : null;
                    }
                } else {
                    el.classList.remove('active');
                }
            });

            // Set up interactive Breadcrumbs
            const breadcrumbsContainer = document.getElementById('breadcrumbs');
            breadcrumbsContainer.innerHTML = '';
            
            // Back-to-home indicator
            const homeSpan = document.createElement('span');
            homeSpan.innerText = 'Home';
            homeSpan.style.cursor = 'pointer';
            homeSpan.addEventListener('click', goHome);
            breadcrumbsContainer.appendChild(homeSpan);

            if (filePath !== 'README.md') {
                const parts = filePath.split('/');
                let accumulatedPath = '';
                
                parts.forEach((part, index) => {
                    const sep = document.createElement('span');
                    sep.className = 'breadcrumb-separator';
                    sep.innerText = '/';
                    breadcrumbsContainer.appendChild(sep);

                    accumulatedPath = accumulatedPath ? accumulatedPath + '/' + part : part;
                    const pathClosure = accumulatedPath;

                    const span = document.createElement('span');
                    const cleanPart = part.endsWith('.md') ? part.substring(0, part.length - 3) : part;
                    span.innerText = cleanPart.split(/[-_]+/).map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');

                    if (index === parts.length - 1) {
                        span.className = 'breadcrumb-active';
                    } else {
                        span.style.cursor = 'pointer';
                        span.addEventListener('click', () => {
                            navigateToResolvedPath(pathClosure);
                        });
                    }
                    breadcrumbsContainer.appendChild(span);
                });
            }

            try {
                const response = await fetch(filePath);
                if (!response.ok) throw new Error('File not found');
                let markdown = await response.text();
                
                // Pre-process custom alerts
                markdown = parseAlertBlocks(markdown);
                
                // Render Markdown to HTML
                const markdownContentDiv = document.getElementById('markdown-content');
                
                let prependHeroHTML = '';
                // Prepend hero section only for main landing README.md
                if (filePath === 'README.md') {
                    prependHeroHTML = `
                        <div class="readme-hero">
                            <h1 class="readme-hero-title">ML-Nexus Resource Hub</h1>
                            <p class="readme-hero-subtitle">Interactive index of MLOps, System Design, and Infrastructure resources</p>
                            <div class="hero-stats" style="margin-top: 28px;">
                                <div class="stat-card">
                                    <span class="stat-val">${stats.lessons}</span>
                                    <span class="stat-lbl">Lessons</span>
                                </div>
                                <div class="stat-card">
                                    <span class="stat-val">${stats.designs}</span>
                                    <span class="stat-lbl">System Designs</span>
                                </div>
                                <div class="stat-card">
                                    <span class="stat-val">${stats.projects}</span>
                                    <span class="stat-lbl">Projects</span>
                                </div>
                            </div>
                        </div>
                    `;
                }

                markdownContentDiv.innerHTML = prependHeroHTML + marked.parse(markdown);
                
                // Highlight syntax
                Prism.highlightAllUnder(markdownContentDiv);
                
                // Inject code block copy buttons
                addCopyButtons();
                
                // Render LaTeX equations
                renderMathInElement(markdownContentDiv, {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '$', right: '$', display: false},
                        {left: '\\(', right: '\\)', display: false},
                        {left: '\\[', right: '\\]', display: true}
                    ],
                    throwOnError: false
                });

                // Generate TOC
                buildTOC();
                
                document.getElementById('reader-view').style.display = 'grid';
                document.getElementById('content-panel').scrollTop = 0;
                document.getElementById('progress-bar').style.width = '0%';
            } catch (err) {
                console.error(`Error loading markdown file ${filePath}:`, err);
                document.getElementById('error-view').style.display = 'flex';
            }
        }

        // Dynamic Table of Contents builder
        function buildTOC() {
            const container = document.getElementById('markdown-content');
            const tocList = document.getElementById('toc-list');
            tocList.innerHTML = '';
            
            // Exclude headers in the custom readme hero section
            const headings = Array.from(container.querySelectorAll('h2, h3'))
                .filter(h => !h.closest('.readme-hero'));
            
            if (headings.length === 0) {
                document.querySelector('.toc-aside').style.display = 'none';
                return;
            } else {
                document.querySelector('.toc-aside').style.display = 'block';
            }

            headings.forEach((heading, index) => {
                const id = `toc-heading-${index}`;
                heading.setAttribute('id', id);
                
                const li = document.createElement('li');
                const a = document.createElement('a');
                a.className = `toc-link ${heading.tagName.toLowerCase() === 'h3' ? 'indent-2' : ''}`;
                a.innerText = heading.innerText;
                
                a.addEventListener('click', () => {
                    heading.scrollIntoView({ behavior: 'smooth' });
                });
                
                li.appendChild(a);
                tocList.appendChild(li);
            });

            // Set up scroll spying
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const id = entry.target.getAttribute('id');
                        document.querySelectorAll('.toc-link').forEach(link => {
                            link.classList.remove('active');
                        });
                        const activeLink = Array.from(document.querySelectorAll('.toc-link')).find(link => {
                            return link.innerText === entry.target.innerText;
                        });
                        if (activeLink) activeLink.classList.add('active');
                    }
                });
            }, {
                root: document.getElementById('content-panel'),
                rootMargin: '0px 0px -60% 0px',
                threshold: 0.1
            });

            headings.forEach(h => observer.observe(h));
        }

        // Live Search Handler
        function handleSearch(query) {
            query = query.trim().toLowerCase();
            
            const readerView = document.getElementById('reader-view');
            const searchView = document.getElementById('search-view');
            const errorView = document.getElementById('error-view');

            if (!query) {
                readerView.style.display = 'grid';
                searchView.style.display = 'none';
                errorView.style.display = 'none';
                return;
            }

            readerView.style.display = 'none';
            errorView.style.display = 'none';
            searchView.style.display = 'block';

            const results = flattenedFiles.filter(item => {
                return item.name.toLowerCase().includes(query) || 
                       item.path.toLowerCase().includes(query);
            });

            document.getElementById('search-results-count').innerText = `Found ${results.length} result(s) matching "${query}"`;
            
            const resultsList = document.getElementById('search-results-list');
            resultsList.innerHTML = '';

            if (results.length === 0) {
                resultsList.innerHTML = `
                    <div style="padding: 24px; text-align: center; color: var(--text-muted); font-size: 0.95rem;">
                        No resources matched your search query. Try another keyword.
                    </div>
                `;
                return;
            }

            results.forEach(result => {
                const item = document.createElement('div');
                item.className = 'search-result-item';
                const folderPath = result.path.substring(0, result.path.lastIndexOf('/')) || 'Root';
                
                item.innerHTML = `
                    <h3 class="search-result-name">${result.name}</h3>
                    <div class="search-result-path">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                        <span>${folderPath}</span>
                    </div>
                `;
                
                item.addEventListener('click', () => {
                    window.location.hash = encodeURIComponent(result.path);
                });
                
                resultsList.appendChild(item);
            });
        }
    </script>
</body>
